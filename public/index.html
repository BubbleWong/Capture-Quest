<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#39c7d4">
    <title>Capture Quest</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/assets/quest-camera.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <a class="brand" href="/" aria-label="Capture Quest home">
          <img src="/assets/quest-camera.svg" alt="" width="48" height="48">
          <span>
            <strong>Capture Quest</strong>
            <small>camera hunt</small>
          </span>
        </a>
        <div class="top-actions">
          <button class="icon-button" id="leaderboardButton" type="button" aria-label="Open leaderboard" title="Leaderboard">★</button>
          <span class="connection-pill" id="connectionPill">connecting</span>
        </div>
      </header>

      <main id="app" class="main-stage" aria-live="polite"></main>
    </div>

    <dialog id="leaderboardDialog" class="leaderboard-dialog">
      <div class="dialog-head">
        <h2>Leaderboard</h2>
        <button class="icon-button" id="closeLeaderboardButton" type="button" aria-label="Close leaderboard" title="Close">×</button>
      </div>
      <div id="leaderboardContent" class="leaderboard-content"></div>
    </dialog>

    <template id="scoreRowTemplate">
      <li class="score-row">
        <span class="score-rank"></span>
        <span class="score-name"></span>
        <span class="score-value"></span>
      </li>
    </template>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/scripts/app.js"></script>
  </body>
</html>
